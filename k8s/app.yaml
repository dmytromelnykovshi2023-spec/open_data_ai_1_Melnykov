apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  namespace: open-data-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.28
          command: ['sh', '-c', "until nc -z postgres 5432; do echo waiting for db; sleep 2; done"]
        
        # Replace these images with your actual registry images once built
        # e.g., myregistry/data_load:latest
        - name: data-load
          image: data_load:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: DB_HOST
              value: "postgres"
          volumeMounts:
            - name: data-volume
              mountPath: /app/data
            - name: reports-volume
              mountPath: /app/reports
            - name: plots-volume
              mountPath: /app/plots
              
        - name: data-quality
          image: data_quality_analysis:latest
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - name: reports-volume
              mountPath: /app/reports
              
        - name: data-research
          image: data_research:latest
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - name: reports-volume
              mountPath: /app/reports

        - name: visualization
          image: visualization:latest
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - name: plots-volume
              mountPath: /app/plots

      containers:
        - name: web
          image: web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          volumeMounts:
            - name: reports-volume
              mountPath: /app/reports
            - name: plots-volume
              mountPath: /app/plots
              
      volumes:
        - name: data-volume
          emptyDir: {}
        - name: reports-volume
          emptyDir: {}
        - name: plots-volume
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: web-service
  namespace: open-data-ai
spec:
  type: NodePort
  selector:
    app: web-app
  ports:
    - protocol: TCP
      port: 5001
      targetPort: 5000
      nodePort: 30001
