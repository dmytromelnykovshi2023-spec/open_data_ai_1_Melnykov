<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Аналіз нерухомості</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f8f9fa; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1, h2 { color: #333; }
        .metric { font-size: 18px; margin: 10px 0; padding: 15px; background: #e2e3e5; border-radius: 5px; }
        img { max-width: 100%; border-radius: 5px; margin-top: 20px; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Звіт: Аналіз вільних приміщень</h1>
        <p>Мікросервісна архітектура Docker успішно відпрацювала!</p>

        <h2>1. Якість даних</h2>
        <div class="metric"><strong>Всього записів у базі:</strong> {{ quality.get('total_rows', 'Дані формуються...') }}</div>
        <div class="metric"><strong>Кількість дублікатів:</strong> {{ quality.get('duplicates', 'Дані формуються...') }}</div>

        <h2>2. Візуалізація даних</h2>
        <!-- Ці картинки Flask бере з нашої папки /app/plots, яку згенерував попередній контейнер -->
        <img src="/plots/dist_plot.png" alt="Графік розподілу за районами">
        <img src="/plots/bar_plot.png" alt="Графік довжини назв">
    </div>
</body>
</html>
