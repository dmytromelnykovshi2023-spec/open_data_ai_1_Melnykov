name: Modules CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      target_module:
        description: 'Оберіть модуль (або all для всіх)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - data_load
          - data_quality

jobs:
  test-modules:
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        module: [data_load, data_quality]

    steps:
      # 1. Розумний фільтр: перевіряємо, чи треба запускати цей модуль
      - name: Фільтр ручного запуску
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.target_module }}" != "all" ] && [ "${{ inputs.target_module }}" != "${{ matrix.module }}" ]; then
            echo "run_job=false" >> $GITHUB_ENV
            echo "Цей модуль пропущено користувачем."
          else
            echo "run_job=true" >> $GITHUB_ENV
          fi

      # Всі наступні кроки виконаються ТІЛЬКИ якщо run_job == 'true'
      - name: Отримання коду
        if: env.run_job == 'true'
        uses: actions/checkout@v4

      - name: Налаштування Python
        if: env.run_job == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Встановлення залежностей
        if: env.run_job == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install pytest flake8

      - name: Запуск перевірок для ${{ matrix.module }}
        if: env.run_job == 'true'
        run: |
          echo "Створюємо папку для артефактів..."
          mkdir -p artifacts/${{ matrix.module }}
          
          echo "Запускаємо лінтер..."
          # Зверніть увагу, тут вже додано .py
          flake8 src/${{ matrix.module }}.py > artifacts/${{ matrix.module }}/lint_report.txt || true

      - name: Завантаження артефактів
        if: env.run_job == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ matrix.module }}
          path: artifacts/${{ matrix.module }}/
