name: Python CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-code:
    runs-on: ubuntu-latest

    steps:
    - name: Отримання коду репозиторію
      uses: actions/checkout@v4

    - name: Налаштування Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Встановлення лінтера (flake8)
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    - name: Перевірка коду в папці src
      run: |
        # Перевіряємо тільки папку src на наявність критичних помилок
        flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
