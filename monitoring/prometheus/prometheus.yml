global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # Збір метрик з твоїх мікросервісів
  - job_name: 'data_load_service'
    static_configs:
      - targets: ['data_load:8000']

  - job_name: 'web_service'
    static_configs:
      - targets: ['web:8000']